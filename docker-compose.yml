services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: carhorizon
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    build: .
    restart: always
    ports:
      - "5001:5001"
    # Allows the container to reach the MQTT broker on the host network
    # (e.g. 10.0.0.11 or a Raspberry Pi on the same LAN)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=carhorizon
      - APP_PASSWORD=pepweb-1
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - SECRET_KEY=${SECRET_KEY:-carhorizon-secret-key-2026}
      - TOTP_SECRET=${TOTP_SECRET:-}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - NOTIFICATION_EMAILS=${NOTIFICATION_EMAILS:-}
      - CAMERA_URL_1=${CAMERA_URL_1:-rtsp://192.168.32.98/live2.sdp}
      - CAMERA_URL_2=${CAMERA_URL_2:-rtsp://192.168.32.99/live2.sdp}
      - MQTT_BROKER=${MQTT_BROKER:-10.0.0.11}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_TOPIC=${MQTT_TOPIC:-application/2/device/+/event/up}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
    depends_on:
      - db

volumes:
  mysql_data:
